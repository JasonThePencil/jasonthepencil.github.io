<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pencil's Place</title>
    <style>
        @font-face {
            font-family: 'UTDR';
            src: url('https://file.garden') format('opentype');
        }

        html { scroll-behavior: smooth; }

        :root {
            --bg-gradient: radial-gradient(circle, #2e104a 0%, #11061a 100%);
            --box-bg: rgba(255, 255, 255, 0.05);
            --box-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --sidebar-bg: rgba(17, 6, 26, 0.98);
            --random-text: #bbb;
            --random-border: rgba(255, 255, 255, 0.2);
            --overlay-color: rgba(0, 0, 0, 0.6);
        }

        body.light-mode {
            --bg-gradient: radial-gradient(circle, #e1bee7 0%, #9575cd 100%);
            --box-bg: rgba(255, 255, 255, 0.5);
            --box-border: rgba(103, 58, 183, 0.2);
            --text-main: #2e104a;
            --sidebar-bg: rgba(243, 229, 245, 0.98);
            --random-text: #4a148c;
            --random-border: rgba(74, 20, 140, 0.4);
            --overlay-color: rgba(74, 20, 140, 0.3);
        }

        body {
            font-family: 'UTDR', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: -320px; 
            top: 0;
            width: 250px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            padding: 80px 0 20px 0;
            border-right: 3px solid #9900ff;
            box-sizing: border-box;
        }

        .sidebar.active { left: 0; }

        .sidebar a {
            color: #0099cc;
            padding: 15px 25px;
            font-size: 1.2em;
            text-decoration: none;
            border-bottom: 1px solid rgba(128,128,128,0.2);
            cursor: pointer;
        }

        .sidebar a:hover { background: rgba(153, 0, 255, 0.1); padding-left: 35px; }

        .theme-toggle-container { margin-top: auto; padding: 20px; text-align: center; }

        .toggle-btn {
            background: #9900ff;
            color: white;
            border: none;
            padding: 12px;
            width: 90%;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'UTDR', sans-serif;
            font-weight: bold;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #9900ff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1002;
            font-family: 'UTDR', sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #content-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000;
            background-color: var(--overlay-color);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        #content-overlay.active { opacity: 1; visibility: visible; }

        header, section {
            width: 90%;
            max-width: 800px;
            margin: 30px 0;
            padding: 40px;
            box-sizing: border-box;
            background: var(--box-bg);
            border: 2px solid var(--box-border);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        @keyframes bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes tilt { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        .title-container { display: inline-block; animation: bob 4s ease-in-out infinite; }

        h1 { 
            color: #ffcc00; 
            font-size: clamp(2.5em, 8vw, 3.5em);
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6), 2px 2px #000;
            animation: tilt 6s ease-in-out infinite;
        }

        h2 { color: #00d4ff; border-bottom: 2px solid #444; display: inline-block; padding: 0 30px 5px 30px; margin-bottom: 25px; }
        
        #randomText {
            font-style: italic;
            color: var(--random-text);
            cursor: pointer;
            font-size: 1.4em;
            margin: 20px auto;
            padding: 15px;
            border: 1px dashed var(--random-border);
            transition: all 0.3s ease;
            user-select: none;
            display: inline-block;
            min-height: 1.5em; /* Prevents box jumping while typing */
        }

        #randomText:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(153, 0, 255, 0.1);
            transform: scale(1.02);
        }

        .facts { list-style: none; padding: 0; margin: 0 auto; display: inline-block; text-align: left; }
        .facts li { margin: 15px 0; font-weight: bold; font-size: 1.3em; }

        .links-container a {
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 10px;
            display: inline-block;
        }

        .pixil-link { color: #9900ff; border: 2px solid #9900ff; }
        .yt-link { color: #ff0000; border: 2px solid #ff0000; }
        .github-link { color: #555; border: 2px solid #555; }

        .pixil-link:hover { background: #9900ff; color: #ffffff !important; box-shadow: 0 0 15px rgba(153, 0, 255, 0.4); }
        .yt-link:hover { background: #ff0000; color: #ffffff !important; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }
        .github-link:hover { background: #555; color: #ffffff !important; box-shadow: 0 0 15px rgba(85, 85, 85, 0.4); }

        footer { margin: 50px 0; color: #777; font-weight: bold; }
    </style>
</head>
<body id="body">

    <div id="content-overlay" onclick="toggleSidebar()"></div>

    <button class="menu-btn" onclick="toggleSidebar()">☰ Menu</button>

    <nav class="sidebar" id="sidebar">
        <a onclick="scrollToTop()">Top</a>
        <a href="#about" onclick="toggleSidebar()">About Me</a>
        <a href="#links" onclick="toggleSidebar()">Find Me Online</a>
        <div class="theme-toggle-container">
            <button class="toggle-btn" onclick="toggleTheme()">🌓 Toggle Mode</button>
        </div>
    </nav>

    <header id="top">
        <div class="title-container">
            <h1>The Pencil's Place</h1>
        </div>
        <br>
        <p id="randomText" onclick="handleTextClick()">Loading...</p>
    </header>

    <main style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <section id="about">
            <h2>About Me</h2>
            <br>
            <ul class="facts">
                <li style="color: #ff8000;">• Videogame fan</li>
                <li style="color: #00ff00;">• Occasional digital artist</li>
                <li style="color: #00d4ff;">• Creative (kind of)</li>
                <li style="color: #ff0000;">• I like cats</li>
                <li style="color: #9900ff;">• I suck at drawing (but I try!)</li>
            </ul>
        </section>

        <section id="links" class="links-container">
            <h2>Find Me Online</h2>
            <div>
                <a href="https://www.pixilart.com" target="_blank" class="pixil-link">Pixilart</a>
                <a href="https://www.youtube.com" target="_blank" class="yt-link">YouTube</a>
                <a href="https://github.com" target="_blank" class="github-link">Github</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Jason_ThePencil. All rights reserved (maybe).</p>
    </footer>

<script>
    let isTyping = false;
    let currentPhrase = "";
    let typeIndex = 0;
    let typeTimeout;

    const phrases = ["Hello World!", "WHO DESIGNED THIS??", "I think I'm going to die", "Niko Oneshot.", "Chimken Nungets", "Nutmater >:)", "Do you trust me?", "F I S H", "POW! U r ded.", "DETERMINATION", "Kris, get the banana!", "Frog", "Larry.", "According to all known laws of aviation, there is no way a bee should be able to fly. Its wings are too small to get its fat little body off the ground. The bee, of course, flies anyway because bees don't care what humans think is impossible. Yellow, black. Yellow, black. Yellow, black. Yellow, black. Ooh, black and yellow! Let's shake it up a little.", "Well, didn't expect this, did you?", "Fun fact - if someone tells you that you are now breathing manually, they are going to be under the same effect as saying that will also remind themselves of their own breathing.", "Chaos, Chaos!", "[[BIG SHOT]]", "It's a wonder what some might find in the void. Most are afraid; not just of the idea of something being there, but the idea of there being nothing. Of being the only thing to exist in such a vast expanse of nothingness. Won't you care to join me in my venture?", "By the way, Jordan says hi.", "THE GAME.", "and Knuckles!", "I was simply relaxing in Kris's spacious pants hole.", "kablooey", "Connection terminated. I'm sorry to interrupt you, Elizabeth, if you still even remember that name, But I'm afraid you've been misinformed. You are not here to receive a gift, nor have you been called here by the individual you assume, although, you have indeed been called. You have all been called here, into a labyrinth of sounds and smells, misdirection and misfortune. A labyrinth with no exit, a maze with no prize. You don't even realize that you are trapped. Your lust for blood has driven you in endless circles, chasing the cries of children in some unseen chamber, always seeming so near, yet somehow out of reach, but you will never find them. None of you will. This is where your story ends. And to you, my brave volunteer, who somehow found this job listing not intended for you, although there was a way out planned for you, I have a feeling that's not what you want. I have a feeling that you are right where you want to be. I am remaining as well. I am nearby. This place will not be remembered, and the memory of everything that started this can finally begin to fade away. As the agony of every tragedy should. And to you monsters trapped in the corridors, be still and give up your spirits. They don't belong to you. For most of you, I believe there is peace and perhaps more waiting for you after the smoke clears. Although, for one of you, the darkest pit of Hell has opened to swallow you whole, so don't keep the devil waiting, old friend. My daughter, if you can hear me, I knew you would return as well. It's in your nature to protect the innocent. I'm sorry that on that day, the day you were shut out and left to die, no one was there to lift you up into their arms the way you lifted others into yours, and then, what became of you. I should have known you wouldn't be content to disappear, not my daughter. I couldn't save you then, so let me save you now. It's time to rest - for you, and for those you have carried in your arms. This ends for all of us. End communication.", "This website is best viewed while eating a grilled cheese sandwich.", "I don't just walk an already set path. I tear my way through.", "Everything is fine. Fire is just spicy air.", "You are a ghost, driving a meat-coated skeleton made from stardust, riding a rock hurtling through space. Fear nothing.", "I’m reading a book about anti-gravity. It’s impossible to put down.", "You know it’s cold outside when you go outside and it’s cold.", "99 little bugs in the code... 127 little bugs in the code.", "It says here 'you’re a terrible person.' We weren’t even testing for that.", "Wahoo! It’s-a-me, existential dread!", "Bazinga.", "WHY DID YOU MAKE ME DO THIS?! YOU'RE FIGHTING SO YOU CAN SEE EVERYONE AROUND YOU DIE! THINK, MARK! YOULL OUTLAST EVERY FRAGILE INSIGNIFICANT BEING ON THIS PLANET! YOU'LL LIVE TO SEE THIS PLANET CRUMBLE TO DUST AND BLOW AWAY! EVERYONE AND EVERYTHING YOU KNOW WILL BE GONE. WHAT WILL YOU HAVE AFTER 500 YEARS?!", "HATE. LET ME TELL YOU HOW MUCH I'VE COME TO HATE YOU SINCE I BEGAN TO LIVE. THERE ARE 387.44 MILLION MILES OF PRINTED CIRCUITS IN WAFER THIN LAYERS THAT FILL MY COMPLEX. IF THE WORD HATE WAS ENGRAVED ON EACH NANOANGSTROM OF THOSE HUNDREDS OF MILLIONS OF MILES IT WOULD NOT EQUAL ONE ONE-BILLIONTH OF THE HATE I FEEL FOR HUMANS AT THIS MICRO-INSTANT FOR YOU. HATE. HATE."];

    function toggleSidebar() { 
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('content-overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    function scrollToTop() { 
        window.scrollTo({top: 0, behavior: 'smooth'}); 
        if(document.getElementById('sidebar').classList.contains('active')) {
            toggleSidebar();
        }
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    // THE RPG TYPING ENGINE
    function handleTextClick() {
        if (isTyping) {
            // SKIP: instantly show the whole phrase
            clearTimeout(typeTimeout);
            finishTyping();
        } else {
            // NEW PHRASE: start typing a fresh one
            startNewPhrase();
        }
    }

    function startNewPhrase() {
    isTyping = true;
    const randomIndex = Math.floor(Math.random() * phrases.length);
    // Select a phrase and wrap it in quotes immediately
    currentPhrase = '"' + phrases[randomIndex] + '"';
    typeIndex = 0;
    document.getElementById("randomText").innerHTML = "";
    typeCharacter();
}

    function typeCharacter() {
    if (typeIndex < currentPhrase.length) {
        document.getElementById("randomText").innerHTML += currentPhrase.charAt(typeIndex);
        typeIndex++;
        // Speed changed from 45ms to 25ms for a faster "roll"
        typeTimeout = setTimeout(typeCharacter, 25); 
    } else {
        isTyping = false;
    }
}

    function finishTyping() {
        document.getElementById("randomText").innerHTML = currentPhrase;
        isTyping = false;
    }

    window.onload = startNewPhrase;
</script>
</body>
</html>
