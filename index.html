<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pencil's Place</title>
    <style>
        /* Loading the custom font */
        @font-face {
            font-family: 'UTDR';
            src: url('https://file.garden') format('opentype');
        }

        body {
            font-family: 'UTDR', sans-serif;
            background: radial-gradient(circle, #2e104a 0%, #11061a 100%);
            background-attachment: fixed;
            color: #f0f0f0;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animation 1: Independent Bobbing */
        @keyframes bob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Animation 2: Independent Tilting */
        @keyframes tilt {
            0%, 100% { rotate: -2deg; }
            50% { rotate: 2deg; }
        }

        .title-container {
            display: inline-block;
            /* Combines both animations with different speeds to avoid "shimmying" */
            animation: bob 4s ease-in-out infinite;
            margin-bottom: 5px;
        }

        h1 { 
            color: #ffcc00; 
            font-size: 3.5em; 
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6), 2px 2px #000;
            /* Tilt animation is on a different timer than the bob */
            animation: tilt 6s ease-in-out infinite;
            display: inline-block;
        }

        h2 { 
            color: #00d4ff; 
            border-bottom: 2px solid #444; 
            display: inline-block; 
            padding: 0 30px 5px 30px; 
            margin-top: 40px;
        }
        
        #randomText {
            font-style: italic;
            color: #bbb;
            cursor: pointer;
            font-size: 1.5em;
            margin: 20px auto;
            max-width: 80%;
            padding: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            display: block;
            transition: all 0.3s ease;
            user-select: none;
        }

        #randomText:hover { 
            color: #ffffff; 
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .facts { list-style: none; padding: 0; margin: 30px 0; }
        .facts li { margin: 15px 0; font-weight: bold; font-size: 1.3em; }

        .links-container {
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-top: 3px solid #444;
            margin-top: 50px;
            border-radius: 15px;
        }
        
        a {
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.2em;
            display: inline-block;
            margin: 10px;
        }

        .pixil-link { color: #9900ff; border: 2px solid #9900ff; }
        .pixil-link:hover { background: #9900ff; color: white; box-shadow: 0 0 15px #9900ff; }

        .yt-link { color: #ff0000; border: 2px solid #ff0000; }
        .yt-link:hover { background: #ff0000; color: white; box-shadow: 0 0 15px #ff0000; }
        
        .github-link { color: #bbbbbb; border: 2px solid #555555; }
        .github-link:hover { background: #555555; color: white; box-shadow: 0 0 15px #555555; }

        footer { margin-top: 60px; font-size: 1em; color: #777; padding-bottom: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1>The Pencil's Place</h1>
        </div>
        <p id="randomText" onclick="changeText()">Loading...</p>
    </header>

    <main>
        <section>
            <h2>About Me</h2>
            <ul class="facts">
                <li style="color: #ff8000;">Videogame fan</li>
                <li style="color: #00ff00;">Occasional digital artist</li>
                <li style="color: #00d4ff;">Creative (kind of)</li>
                <li style="color: #ff4d4d;">I like cats</li>
                <li style="color: #9900ff;">I suck at drawing (but I try!)</li>
            </ul>
        </section>

        <section class="links-container">
            <h3>Find Me Online</h3>
            <a href="https://www.pixilart.com" target="_blank" class="pixil-link">Pixilart: Jason_ThePencil</a>
            <a href="https://www.youtube.com" target="_blank" class="yt-link">YouTube: Jason The Pencil</a>
            <a href="https://github.com" target="_blank" class="github-link">Github: JasonThePencil</a>
        </section>
    </main>

    <footer>
        <p>Smth smth copywrite goes here I think</p>
    </footer>

<script>
    function changeText() {
        const phrases = [
            "Hello World!", "WHO DESIGNED THIS??", "I think I'm going to die",
            "Niko Oneshot.", "Chimken Nungets", "Nutmater >:)",
            "Do you trust me?", "F I S H", "Lol this was coded by AI",
            "POW! U r ded.", "who wants to hold the tungsten cube?", "Tpyo",
            "Fish Farm", "Not-so-smart", "DETERMINATION", "Kris, get the banana!",
            "Frog", "Ur mother", "Larry."
        ];
        const randomIndex = Math.floor(Math.random() * phrases.length);
        document.getElementById("randomText").innerHTML = '"' + phrases[randomIndex] + '"';
    }
    window.onload = changeText;
</script>
</body>
</html>
