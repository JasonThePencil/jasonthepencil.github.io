<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - The Pencil's Place</title>
    <link rel="icon" type="image/png" href="https://file.garden/aCkCJi4AGRH6xV67/The%20Pencil&#39;s%20Place/favicon.png">
    <style>
        @font-face {
            font-family: 'UTDR';
            src: url('https://file.garden') format('opentype');
        }

        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-gradient: radial-gradient(circle, #2e104a 0%, #11061a 100%);
            --box-bg: rgba(255, 255, 255, 0.05);
            --box-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
        }

        body.light-mode {
            --bg-gradient: radial-gradient(circle, #e1bee7 0%, #9575cd 100%);
            --box-bg: rgba(255, 255, 255, 0.5);
            --box-border: rgba(103, 58, 183, 0.2);
            --text-main: #2e104a;
        }

        body {
            font-family: 'UTDR', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #9900ff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1002;
            font-family: 'UTDR', sans-serif;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: #b333ff;
        }

        header,
        section {
            width: 90%;
            max-width: 800px;
            margin: 30px 0;
            padding: 40px;
            box-sizing: border-box;
            background: var(--box-bg);
            border: 2px solid var(--box-border);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes tilt {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .title-container {
            display: inline-block;
            animation: bob 4s ease-in-out infinite;
        }

        h1 {
            color: #ffcc00;
            font-size: clamp(2.5em, 8vw, 3.5em);
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.6), 2px 2px #000;
            animation: tilt 6s ease-in-out infinite;
        }

        footer {
            margin: auto 0 50px 0;
            color: #777;
            font-weight: bold;
        }

        /* Added only to make the form look nice inside your design */
        .form-container iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <a href="https://file.garden/aCkCJi4AGRH6xV67/The%20Pencil&#39;s%20Place/index.html" class="back-btn">← BACK</a>

    <header>
        <div class="title-container">
            <h1>Contacts</h1>
        </div>
    </header>

    <main style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <section>
            <div class="form-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdOYdheCOwVE8J7xjO7lwGktk-OIB6Kr0eDmP2fMb5vmDPSYw/viewform?usp=dialog"></iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Jason_ThePencil. All rights reserved (maybe).</p>
    </footer>

</body></html>
